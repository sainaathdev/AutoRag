# Self-Improving RAG System Configuration
# Paths support environment variable overrides for cloud deployment

# Groq API Configuration (key injected via environment / HF Secrets)
groq:
  api_key: "${GROQ_API_KEY}"
  base_url: "https://api.groq.com/openai/v1"
  model: "llama-3.3-70b-versatile"
  temperature: 0.7
  max_tokens: 2000

# Vector Database Configuration
vector_db:
  type: "chromadb"
  persist_directory: "${VECTOR_DB_PATH:./data/vector_db}"
  collection_name: "rag_documents"

# Embedding Configuration
embedding:
  model: "sentence-transformers/all-MiniLM-L6-v2"
  dimension: 384
  batch_size: 32

# Chunking Configuration
chunking:
  default_chunk_size: 512
  default_overlap: 50
  min_chunk_size: 256
  max_chunk_size: 1024
  adaptive_enabled: true
  semantic_chunking: true

# Retrieval Configuration
retrieval:
  default_top_k: 5
  min_top_k: 3
  max_top_k: 10
  hybrid_search_enabled: true
  bm25_weight: 0.3
  vector_weight: 0.7
  reranking_enabled: true
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# Confidence Thresholds
confidence:
  low_threshold: 0.6
  medium_threshold: 0.75
  high_threshold: 0.85
  auto_improve_threshold: 0.6

# Feedback & Learning
feedback:
  store_path: "${FEEDBACK_PATH:./data/feedback}"
  failure_memory_size: 1000
  performance_window: 100
  auto_optimization_enabled: true
  optimization_interval: 50

# Query Rewriting
query_rewriting:
  enabled: true
  expand_keywords: true
  detect_intent: true
  ambiguity_threshold: 0.7

# Answer Evaluation
evaluation:
  hallucination_detection: true
  completeness_check: true
  context_relevance_check: true
  auto_evaluate: true
  ragas_enabled: true

# Optimization
optimization:
  rechunk_on_failure: true
  rechunk_threshold: 3
  embedding_drift_detection: true
  ab_testing_enabled: true
  learning_rate: 0.1

# Dashboard
dashboard:
  enabled: true
  port: 8501
  update_interval: 5
  show_confidence_trends: true
  show_retrieval_stats: true

# Logging
logging:
  level: "INFO"
  file: "./logs/rag_system.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
